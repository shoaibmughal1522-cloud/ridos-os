name: Build RIDOS OS ISO

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ── Step 1: Install live-build and tools ─────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            isolinux \
            syslinux \
            syslinux-common \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            dosfstools \
            rsync \
            curl \
            wget \
            git
          echo "Dependencies installed"

      # ── Step 2: Configure live-build ─────────────────────────────────────────
      - name: Configure live-build
        run: |
          mkdir -p ridos-live
          cd ridos-live

          lb config \
            --distribution bookworm \
            --archive-areas "main contrib non-free non-free-firmware" \
            --debian-installer none \
            --bootappend-live "boot=live components quiet splash nomodeset vga=788 ip=none" \
            --linux-flavours amd64 \
            --binary-images iso-hybrid \
            --iso-volume "RIDOS_OS" \
            --iso-publisher "RIDOS OS" \
            --iso-application "RIDOS OS v1.1.0 Baghdad" \
            --firmware-binary true \
            --firmware-chroot true \
            --apt-recommends false \
            --memtest memtest86+

          echo "live-build configured"

      # ── Step 3: Package lists ─────────────────────────────────────────────────
      - name: Create package lists
        run: |
          cd ridos-live
          mkdir -p config/package-lists

          # Core live system
          cat > config/package-lists/01-core.list.chroot << 'EOF'
          live-boot
          live-boot-initramfs-tools
          live-config
          live-config-systemd
          systemd
          systemd-sysv
          udev
          sudo
          bash
          bash-completion
          locales
          tzdata
          ca-certificates
          apt-transport-https
          wget
          curl
          rsync
          EOF

          # Hardware drivers - full PC/laptop support
          cat > config/package-lists/02-hardware.list.chroot << 'EOF'
          firmware-linux
          firmware-linux-free
          firmware-linux-nonfree
          firmware-iwlwifi
          firmware-atheros
          firmware-realtek
          firmware-b43-installer
          firmware-brcm80211
          firmware-ralink
          firmware-mediatek
          firmware-zd1211
          firmware-libertas
          firmware-amd-graphics
          firmware-misc-nonfree
          intel-microcode
          amd64-microcode
          xserver-xorg
          xserver-xorg-video-all
          xserver-xorg-input-all
          xserver-xorg-video-intel
          xserver-xorg-video-amdgpu
          xserver-xorg-video-nouveau
          xserver-xorg-video-radeon
          xserver-xorg-video-fbdev
          xserver-xorg-video-vesa
          xserver-xorg-video-vmware
          xserver-xorg-input-synaptics
          xserver-xorg-input-libinput
          mesa-vulkan-drivers
          mesa-va-drivers
          libgl1-mesa-dri
          alsa-utils
          pulseaudio
          pulseaudio-utils
          pulseaudio-module-bluetooth
          pavucontrol
          bluez
          bluetooth
          network-manager
          network-manager-gnome
          wpasupplicant
          wireless-tools
          iw
          usb-modeswitch
          pciutils
          usbutils
          acpi
          acpid
          acpi-support
          laptop-detect
          tlp
          upower
          ntfs-3g
          exfat-fuse
          exfatprogs
          dosfstools
          gvfs
          gvfs-backends
          udisks2
          EOF

          # XFCE Desktop
          cat > config/package-lists/03-desktop.list.chroot << 'EOF'
          xfce4
          xfce4-terminal
          xfce4-whiskermenu-plugin
          xfce4-power-manager
          xfce4-notifyd
          xfce4-pulseaudio-plugin
          xscreensaver
          lightdm
          lightdm-gtk-greeter
          lightdm-gtk-greeter-settings
          thunar
          thunar-archive-plugin
          thunar-volman
          ristretto
          mousepad
          adwaita-icon-theme
          papirus-icon-theme
          fonts-dejavu
          fonts-liberation
          fonts-noto
          fonts-noto-color-emoji
          dbus-x11
          at-spi2-core
          xdg-utils
          xdg-user-dirs
          EOF

          # Applications
          cat > config/package-lists/04-apps.list.chroot << 'EOF'
          firefox-esr
          python3
          python3-pip
          python3-requests
          python3-psutil
          python3-flask
          python3-flask-socketio
          git
          vim
          nano
          htop
          neofetch
          tree
          zip
          unzip
          p7zip-full
          parted
          gparted
          EOF

          # IT diagnostic tools
          cat > config/package-lists/05-tools.list.chroot << 'EOF'
          smartmontools
          memtest86+
          wireshark
          tshark
          nmap
          net-tools
          traceroute
          openssh-client
          openssh-server
          lshw
          dmidecode
          hdparm
          nvme-cli
          iotop
          iftop
          nethogs
          lynis
          rkhunter
          fail2ban
          ufw
          os-prober
          EOF

          echo "Package lists created"

      # ── Step 4: Hooks - run inside chroot ─────────────────────────────────────
      - name: Create chroot hooks
        run: |
          cd ridos-live
          mkdir -p config/hooks/live

          # Hook: configure user, locale, timezone, services
          cat > config/hooks/live/0100-configure-system.hook.chroot << 'HOOKEOF'
          #!/bin/bash
          set -e

          # Locale
          echo "en_US.UTF-8 UTF-8" >> /etc/locale.gen
          echo "ar_IQ.UTF-8 UTF-8" >> /etc/locale.gen
          locale-gen
          echo "LANG=en_US.UTF-8" > /etc/default/locale

          # Timezone
          ln -sf /usr/share/zoneinfo/Asia/Baghdad /etc/localtime
          echo "Asia/Baghdad" > /etc/timezone

          # Hostname
          echo "ridos-os" > /etc/hostname
          echo "127.0.0.1 localhost"  > /etc/hosts
          echo "127.0.1.1 ridos-os" >> /etc/hosts

          # User
          useradd -m -s /bin/bash -G sudo,audio,video,netdev,plugdev,bluetooth ridos || true
          echo "ridos:ridos" | chpasswd
          echo "root:ridos"  | chpasswd

          # Sudo without password for live session
          echo "ridos ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/ridos
          chmod 440 /etc/sudoers.d/ridos

          # OS branding
          cat > /etc/os-release << 'OSEOF'
          PRETTY_NAME="RIDOS OS v1.1.0 Baghdad"
          NAME="RIDOS OS"
          VERSION_ID="1.1.0"
          VERSION="1.1.0 (Baghdad)"
          ID=ridos
          ID_LIKE=debian
          HOME_URL="https://github.com/alexeaiskinder-mea/ridos-os"
          OSEOF

          echo "RIDOS OS v1.1.0 Baghdad - AI-Powered Linux" > /etc/issue
          echo "Username: ridos | Password: ridos"         >> /etc/issue

          # Fast shutdown
          mkdir -p /etc/systemd/system.conf.d
          cat > /etc/systemd/system.conf.d/timeout.conf << 'SEOF'
          [Manager]
          DefaultTimeoutStopSec=5s
          DefaultTimeoutStartSec=10s
          ShutdownWatchdogSec=10s
          SEOF

          # Mask services that cause boot hangs
          systemctl mask NetworkManager-wait-online.service || true
          systemctl mask systemd-networkd-wait-online.service || true
          systemctl mask apt-daily.service || true
          systemctl mask apt-daily-upgrade.service || true
          systemctl mask apt-daily.timer || true
          systemctl mask apt-daily-upgrade.timer || true
          systemctl mask exim4.service || true
          systemctl mask e2scrub_reap.service || true

          # Enable essential services
          systemctl enable lightdm || true
          systemctl enable NetworkManager || true
          systemctl enable acpid || true

          # Blacklist nouveau (Intel+NVIDIA Optimus lockup fix)
          cat > /etc/modprobe.d/blacklist-nouveau.conf << 'MEOF'
          blacklist nouveau
          blacklist nvidiafb
          options nouveau modeset=0
          MEOF

          # Disable hardware watchdog
          cat > /etc/modprobe.d/watchdog.conf << 'WEOF'
          blacklist iTCO_wdt
          blacklist iTCO_vendor_support
          WEOF

          HOOKEOF
          chmod +x config/hooks/live/0100-configure-system.hook.chroot

          # Hook: LightDM configuration
          cat > config/hooks/live/0200-lightdm.hook.chroot << 'HOOKEOF'
          #!/bin/bash
          set -e

          mkdir -p /etc/lightdm/lightdm.conf.d

          # Main LightDM config - autologin
          cat > /etc/lightdm/lightdm.conf << 'LEOF'
          [LightDM]
          logind-check-graphical=false

          [Seat:*]
          autologin-user=ridos
          autologin-user-timeout=0
          user-session=xfce
          greeter-session=lightdm-gtk-greeter
          LEOF

          # Greeter branding
          cat > /etc/lightdm/lightdm-gtk-greeter.conf << 'GEOF'
          [greeter]
          background=#1a0a2e
          theme-name=Adwaita-dark
          icon-theme-name=Papirus-Dark
          font-name=Noto Sans 11
          GEOF

          # XFCE session file
          mkdir -p /usr/share/xsessions
          cat > /usr/share/xsessions/xfce.desktop << 'SEOF'
          [Desktop Entry]
          Name=Xfce Session
          Exec=startxfce4
          Type=Application
          SEOF

          HOOKEOF
          chmod +x config/hooks/live/0200-lightdm.hook.chroot

          # Hook: XFCE theme and branding
          cat > config/hooks/live/0300-xfce-theme.hook.chroot << 'HOOKEOF'
          #!/bin/bash
          set -e

          mkdir -p /home/ridos/.config/xfce4/xfconf/xfce-perchannel-xml

          # Dark purple theme
          cat > /home/ridos/.config/xfce4/xfconf/xfce-perchannel-xml/xsettings.xml << 'XEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xsettings" version="1.0">
            <property name="Net" type="empty">
              <property name="ThemeName" type="string" value="Adwaita-dark"/>
              <property name="IconThemeName" type="string" value="Papirus-Dark"/>
            </property>
            <property name="Gtk" type="empty">
              <property name="FontName" type="string" value="Noto Sans 10"/>
            </property>
          </channel>
          XEOF

          # Purple wallpaper
          cat > /home/ridos/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-desktop.xml << 'XEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xfce4-desktop" version="1.0">
            <property name="backdrop" type="empty">
              <property name="screen0" type="empty">
                <property name="monitorVirtual1" type="empty">
                  <property name="workspace0" type="empty">
                    <property name="color-style" type="int" value="0"/>
                    <property name="image-style" type="int" value="0"/>
                    <property name="rgba1" type="array">
                      <value type="double" value="0.105"/>
                      <value type="double" value="0.039"/>
                      <value type="double" value="0.180"/>
                      <value type="double" value="1.000"/>
                    </property>
                  </property>
                </property>
              </property>
            </property>
          </channel>
          XEOF

          chown -R ridos:ridos /home/ridos/.config

          HOOKEOF
          chmod +x config/hooks/live/0300-xfce-theme.hook.chroot

          # Hook: Desktop shortcuts
          cat > config/hooks/live/0400-desktop.hook.chroot << 'HOOKEOF'
          #!/bin/bash
          set -e

          mkdir -p /home/ridos/Desktop

          cat > /home/ridos/Desktop/ridos-ai.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=RIDOS AI Shell
          Exec=xfce4-terminal -e "python3 /opt/ridos/bin/ridos_shell.py"
          Icon=utilities-terminal
          Terminal=false
          EOF

          cat > /home/ridos/Desktop/ridos-doctor.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=AI System Doctor
          Exec=xfce4-terminal -e "python3 /opt/ridos/bin/system_doctor.py"
          Icon=computer
          Terminal=false
          EOF

          cat > /home/ridos/Desktop/ridos-network.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=AI Network Analyzer
          Exec=xfce4-terminal -e "python3 /opt/ridos/bin/network_analyzer.py"
          Icon=network-wired
          Terminal=false
          EOF

          cat > /home/ridos/Desktop/ridos-hardware.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=AI Hardware Fixer
          Exec=xfce4-terminal -e "python3 /opt/ridos/bin/hardware_fixer.py"
          Icon=drive-harddisk
          Terminal=false
          EOF

          cat > /home/ridos/Desktop/ridos-security.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=AI Security Scanner
          Exec=xfce4-terminal -e "python3 /opt/ridos/bin/security_scanner.py"
          Icon=security-high
          Terminal=false
          EOF

          cat > /home/ridos/Desktop/firefox.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Firefox Browser
          Exec=firefox-esr %u
          Icon=firefox-esr
          Terminal=false
          EOF

          cat > /home/ridos/Desktop/install-ridos.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Install RIDOS OS to HDD
          Exec=xfce4-terminal -e "sudo python3 /opt/ridos/bin/ridos_installer_gui.py"
          Icon=drive-harddisk
          Terminal=false
          EOF

          cat > /home/ridos/Desktop/ridos-gpu-setup.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Setup GPU Driver
          Exec=xfce4-terminal -e "sudo python3 /opt/ridos/bin/ridos_gpu_setup.py"
          Icon=video-display
          Terminal=false
          EOF

          chmod +x /home/ridos/Desktop/*.desktop
          chown -R ridos:ridos /home/ridos/Desktop

          # Welcome autostart
          mkdir -p /home/ridos/.config/autostart
          cat > /home/ridos/.config/autostart/ridos-welcome.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=RIDOS Welcome
          Exec=xfce4-terminal --title="RIDOS OS v1.1.0 Baghdad" -e "bash -c 'neofetch; echo; echo Welcome to RIDOS OS; bash'"
          Hidden=false
          EOF

          chown -R ridos:ridos /home/ridos/.config

          HOOKEOF
          chmod +x config/hooks/live/0400-desktop.hook.chroot

          # Hook: MOTD and neofetch
          cat > config/hooks/live/0500-motd.hook.chroot << 'HOOKEOF'
          #!/bin/bash
          set -e

          cat > /etc/motd << 'EOF'

            ██████╗ ██╗██████╗  ██████╗ ███████╗
            ██╔══██╗██║██╔══██╗██╔═══██╗██╔════╝
            ██████╔╝██║██║  ██║██║   ██║███████╗
            ██╔══██╗██║██║  ██║██║   ██║╚════██║
            ██║  ██║██║██████╔╝╚██████╔╝███████║
            ╚═╝  ╚═╝╚═╝╚═════╝  ╚═════╝ ╚══════╝

            RIDOS OS v1.1.0 "Baghdad" - AI-Powered Linux
            User: ridos | Pass: ridos
            AI Shell:    python3 /opt/ridos/bin/ridos_shell.py
            Install:     sudo python3 /opt/ridos/bin/ridos_installer_gui.py

          EOF

          mkdir -p /home/ridos/.config/neofetch
          cat > /home/ridos/.config/neofetch/config.conf << 'EOF'
          print_info() {
              info title
              info "OS" distro
              info "Kernel" kernel
              info "Uptime" uptime
              info "DE" de
              info "CPU" cpu
              info "Memory" memory
          }
          EOF
          chown -R ridos:ridos /home/ridos/.config/neofetch

          HOOKEOF
          chmod +x config/hooks/live/0500-motd.hook.chroot

          # Hook: Plymouth boot splash
          cat > config/hooks/live/0600-plymouth.hook.chroot << 'HOOKEOF'
          #!/bin/bash
          set -e

          mkdir -p /usr/share/plymouth/themes/ridos

          cat > /usr/share/plymouth/themes/ridos/ridos.plymouth << 'EOF'
          [Plymouth Theme]
          Name=RIDOS OS
          Description=RIDOS OS Boot Splash
          ModuleName=script

          [script]
          ImageDir=/usr/share/plymouth/themes/ridos
          ScriptFile=/usr/share/plymouth/themes/ridos/ridos.script
          EOF

          cat > /usr/share/plymouth/themes/ridos/ridos.script << 'EOF'
          Window.SetBackgroundTopColor(0.10, 0.03, 0.17);
          Window.SetBackgroundBottomColor(0.04, 0.01, 0.09);
          msg = Sprite();
          msg.SetPosition(Window.GetWidth()/2 - 150, Window.GetHeight()/2, 10000);
          fun refresh() {
            img = Image.Text("RIDOS OS v1.1.0 Baghdad", 1.0, 1.0, 1.0);
            msg.SetImage(img);
          }
          Plymouth.SetRefreshFunction(refresh);
          EOF

          HOOKEOF
          chmod +x config/hooks/live/0600-plymouth.hook.chroot

          # Hook: HDD installer
          cat > config/hooks/live/0700-installer.hook.chroot << 'HOOKEOF'
          #!/bin/bash
          set -e

          mkdir -p /opt/ridos/bin

          cat > /opt/ridos/bin/ridos-install.sh << 'INSTALLEOF'
          #!/bin/bash
          clear
          echo "===================================="
          echo "  RIDOS OS - HDD Installer"
          echo "===================================="
          echo ""
          echo "Available disks:"
          lsblk -d -o NAME,SIZE,MODEL | grep -v loop
          echo ""
          read -p "Enter disk (e.g. sda): " DISK
          DISK="/dev/$DISK"
          if [ ! -b "$DISK" ]; then echo "Disk not found!"; exit 1; fi
          read -p "ERASE ALL DATA on $DISK? Type YES: " CONFIRM
          if [ "$CONFIRM" != "YES" ]; then echo "Cancelled."; exit 0; fi
          parted -s "$DISK" mklabel msdos
          parted -s "$DISK" mkpart primary ext4 1MiB 100%
          parted -s "$DISK" set 1 boot on
          sleep 2
          mkfs.ext4 -F "${DISK}1"
          mkdir -p /mnt/ridos-install
          mount "${DISK}1" /mnt/ridos-install
          rsync -ax --exclude=/proc --exclude=/sys --exclude=/dev \
            --exclude=/run --exclude=/mnt --exclude=/media / /mnt/ridos-install/
          mkdir -p /mnt/ridos-install/{proc,sys,dev,run,mnt,media}
          mount --bind /dev  /mnt/ridos-install/dev
          mount --bind /proc /mnt/ridos-install/proc
          mount --bind /sys  /mnt/ridos-install/sys
          UUID=$(blkid -s UUID -o value "${DISK}1")
          echo "UUID=$UUID / ext4 errors=remount-ro 0 1" > /mnt/ridos-install/etc/fstab
          chroot /mnt/ridos-install apt-get remove -y live-boot live-boot-initramfs-tools live-config 2>/dev/null || true
          chroot /mnt/ridos-install update-initramfs -u 2>/dev/null || true
          chroot /mnt/ridos-install grub-install "$DISK"
          chroot /mnt/ridos-install update-grub
          umount /mnt/ridos-install/sys /mnt/ridos-install/proc /mnt/ridos-install/dev
          umount /mnt/ridos-install
          echo ""
          echo "===================================="
          echo "  RIDOS OS installed successfully!"
          echo "  Remove USB and reboot."
          echo "===================================="
          INSTALLEOF
          chmod +x /opt/ridos/bin/ridos-install.sh

          HOOKEOF
          chmod +x config/hooks/live/0700-installer.hook.chroot

          echo "Hooks created"

      # ── Step 5: Include RIDOS AI tools ───────────────────────────────────────
      - name: Include RIDOS AI tools
        run: |
          cd ridos-live
          mkdir -p config/includes.chroot/opt/ridos/bin
          mkdir -p config/includes.chroot/usr/share/ridos

          # Copy all AI Python tools from repo
          cp ../ridos-core/*.py config/includes.chroot/opt/ridos/bin/
          chmod +x config/includes.chroot/opt/ridos/bin/*.py

          # Copy legal files if present
          cp ../legal/LICENSE.txt config/includes.chroot/usr/share/ridos/ 2>/dev/null || true

          echo "AI tools included"

      # ── Step 6: Build the ISO ─────────────────────────────────────────────────
      - name: Build ISO
        run: |
          cd ridos-live
          sudo lb build 2>&1 | tee ../build.log
          ls -lh *.iso 2>/dev/null || ls -lh *.hybrid.iso 2>/dev/null
          echo "Build complete"

      # ── Step 7: Rename and checksum ──────────────────────────────────────────
      - name: Rename and checksum
        run: |
          cd ridos-live
          ISO=$(ls *.iso 2>/dev/null | head -1)
          if [ -z "$ISO" ]; then
            echo "ERROR: No ISO found"
            ls -la
            exit 1
          fi
          cp "$ISO" ../ridos-os-1.1.0-Baghdad-x86_64.iso
          cd ..
          md5sum ridos-os-1.1.0-Baghdad-x86_64.iso > ridos-os-1.1.0-Baghdad-x86_64.iso.md5
          echo "ISO size: $(du -sh ridos-os-1.1.0-Baghdad-x86_64.iso)"

      # ── Step 8: Upload artifact ───────────────────────────────────────────────
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: RIDOS-OS-1.1.0-Baghdad
          path: |
            ridos-os-1.1.0-Baghdad-x86_64.iso
            ridos-os-1.1.0-Baghdad-x86_64.iso.md5
          retention-days: 30

      # ── Step 9: GitHub Release on tag ────────────────────────────────────────
      - name: Create GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release create "${{ github.ref_name }}" \
            ridos-os-1.1.0-Baghdad-x86_64.iso \
            ridos-os-1.1.0-Baghdad-x86_64.iso.md5 \
            --title "RIDOS OS ${{ github.ref_name }} Baghdad" \
            --notes "## RIDOS OS v1.1.0 Baghdad
          AI-Powered Linux for IT Professionals

          ### Features
          - XFCE desktop with dark purple theme
          - Firefox ESR
          - AI Shell, System Doctor, Network Analyzer, Hardware Fixer, Security Scanner
          - Full offline AI fallback
          - HDD Installer + GUI Installer
          - Fast shutdown (5s)
          - smartmontools + memtest86+ + wireshark
          - Full PC/laptop hardware support
          - Baghdad timezone + Arabic locale

          ### Login
          Username: ridos | Password: ridos

          Built on Debian Bookworm | GPL v3"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
