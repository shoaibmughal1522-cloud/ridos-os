name: Build RIDOS OS ISO

on:
  push:
    branches: [ main, develop ]
    tags:     [ 'v*' ]
  workflow_dispatch:

jobs:
  build-iso:
    name: Build RIDOS OS ISO
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            live-build debootstrap squashfs-tools xorriso \
            grub-pc-bin grub-efi-amd64-bin grub2-common \
            mtools dosfstools isolinux syslinux-common \
            curl wget ca-certificates python3 librsvg2-bin \
            debian-archive-keyring gnupg2
          lb --version

      - name: Import Debian bookworm signing key
        run: |
          sudo gpg --batch --no-tty \
            --keyserver hkps://keyserver.ubuntu.com \
            --recv-keys F8D2585B8783D481 || \
          sudo gpg --batch --no-tty \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys F8D2585B8783D481
          sudo gpg --batch --no-tty \
            --export F8D2585B8783D481 | \
          sudo tee -a /usr/share/keyrings/debian-archive-keyring.gpg > /dev/null
          echo "✓ Key imported"

      - name: Patch live-build for Debian compatibility
        run: |
          # Find and patch all scripts that reference casper
          echo "=== Scripts referencing casper ==="
          grep -rln "casper" /usr/lib/live/build/ 2>/dev/null || true
          # Replace casper with live-boot in all live-build scripts
          for f in $(grep -rln "casper" /usr/lib/live/build/ 2>/dev/null); do
            echo "Patching $f"
            sudo sed -i 's/casper/live-boot/g' "$f"
          done
          # Also patch Contents download
          for f in $(grep -rln "Contents" /usr/lib/live/build/ 2>/dev/null); do
            sudo sed -i 's/wget.*Contents[^ ]*/true/g' "$f" || true
          done
          # Also disable Contents in the bootstrap script
          BOOTSTRAP="/usr/lib/live/build/bootstrap_debootstrap"
          if [ -f "$BOOTSTRAP" ]; then
            sudo sed -i "/lb_chroot_linux-image/a \\ \\ \\ \\ echo 'Acquire::IndexTargets::deb::Contents-deb::DefaultEnabled "false";' > /etc/apt/apt.conf.d/99no-contents" "$BOOTSTRAP" 2>/dev/null || true
          fi
          echo "✓ Patched"

      - name: Prepare directories
        run: |
          mkdir -p build-system/config/includes.chroot/opt/ridos/bin
          mkdir -p build-system/config/includes.chroot/usr/share/ridos
          mkdir -p build-system/config/includes.chroot/etc/ridos
          mkdir -p build-system/config/package-lists
          mkdir -p build-system/config/hooks
          mkdir -p build-system/config/includes.chroot/etc/apt/apt.conf.d
          printf 'Acquire::IndexTargets::deb::Contents-deb::DefaultEnabled "false";\n' \
            > build-system/config/includes.chroot/etc/apt/apt.conf.d/99no-contents

      - name: Inject core files
        run: |
          cp ridos-core/*.py build-system/config/includes.chroot/opt/ridos/bin/
          cp legal/LICENSE.txt legal/COPYRIGHT legal/CONTRIBUTORS.md \
             build-system/config/includes.chroot/usr/share/ridos/
          echo "done"

      - name: Configure live-build
        run: |
          cd build-system
          sudo lb config \
            --distribution bookworm \
            --architectures amd64 \
            --mirror-bootstrap "http://deb.debian.org/debian/" \
            --mirror-chroot "http://deb.debian.org/debian/" \
            --mirror-chroot-security "http://security.debian.org/debian-security/" \
            --mirror-binary "http://deb.debian.org/debian/" \
            --mirror-binary-security "http://security.debian.org/debian-security/" \
            --keyring-packages "debian-archive-keyring" \
            --archive-areas "main contrib non-free non-free-firmware" \
            --binary-images iso-hybrid \
            --debian-installer false \
            --memtest none \
            --iso-volume "RIDOS_OS_1.1" \
            --iso-publisher "RIDOS OS Project" \
            --iso-application "RIDOS OS v1.1 Baghdad" \
            --linux-packages "linux-image" \
            --linux-flavours amd64 \
            --firmware-binary true \
            --firmware-chroot true \
            --apt-recommends false
          echo "configured"
          # Create a chroot_early hook to disable Contents before ANY apt runs
          sudo mkdir -p build-system/config/hooks/live
          cat << 'HOOKEOF' | sudo tee build-system/config/hooks/live/0000-no-contents.hook.chroot > /dev/null
#!/bin/sh
mkdir -p /etc/apt/apt.conf.d
echo 'Acquire::IndexTargets::deb::Contents-deb::DefaultEnabled "false";' > /etc/apt/apt.conf.d/99no-contents
HOOKEOF
          sudo chmod +x build-system/config/hooks/live/0000-no-contents.hook.chroot
          # Also write directly into the chroot apt config includes
          sudo mkdir -p build-system/config/includes.chroot/etc/apt/apt.conf.d
          printf 'Acquire::IndexTargets::deb::Contents-deb::DefaultEnabled "false";\n' | \
            sudo tee build-system/config/includes.chroot/etc/apt/apt.conf.d/99no-contents > /dev/null
          # Patch the live-build linux-image script directly
          LB_LINUX="/usr/lib/live/build/chroot_linux-image"
          if [ -f "$LB_LINUX" ]; then
            sudo sed -i "1a mkdir -p /etc/apt/apt.conf.d 2>/dev/null; echo 'Acquire::IndexTargets::deb::Contents-deb::DefaultEnabled "false";' > /etc/apt/apt.conf.d/99no-contents 2>/dev/null || true" "$LB_LINUX"
            echo "✓ Patched $LB_LINUX"
          fi

      - name: Build ISO
        run: |
          cd build-system
          sudo lb build 2>&1 | tee /tmp/build.log
          ls -lh *.iso 2>/dev/null || ls -lh live-image*.iso 2>/dev/null

      - name: Package ISO
        run: |
          cd build-system
          ISO=$(ls live-image*.iso 2>/dev/null | head -1)
          if [ -z "$ISO" ]; then
            echo "ERROR: No ISO found"
            tail -100 /tmp/build.log
            exit 1
          fi
          mv "$ISO" "../ridos-os-1.1.0-Baghdad-x86_64.iso"
          cd ..
          md5sum ridos-os-1.1.0-Baghdad-x86_64.iso > ridos-os-1.1.0-Baghdad-x86_64.iso.md5

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: RIDOS-OS-1.1.0-Baghdad
          path: |
            ridos-os-1.1.0-Baghdad-x86_64.iso
            ridos-os-1.1.0-Baghdad-x86_64.iso.md5
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 7

      - name: Create GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          name: "RIDOS OS ${{ github.ref_name }} Baghdad"
          body: |
            ## RIDOS OS ${{ github.ref_name }} "Baghdad"
            AI-powered Linux distro for IT professionals.
            Flash with Balena Etcher or dd.
            Copyright (C) 2026 RIDOS OS Project — GPL v3
          files: |
            ridos-os-1.1.0-Baghdad-x86_64.iso
            ridos-os-1.1.0-Baghdad-x86_64.iso.md5
