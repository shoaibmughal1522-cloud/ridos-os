name: Build RIDOS OS ISO

on:
  push:
    branches: [ main, develop ]
    tags:     [ 'v*' ]
  workflow_dispatch:

jobs:
  build-iso:
    name: Build RIDOS OS ISO
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            live-build debootstrap squashfs-tools \
            xorriso grub-pc-bin grub-efi-amd64-bin grub2-common \
            mtools dosfstools syslinux syslinux-common isolinux \
            curl wget ca-certificates python3 librsvg2-bin \
            debian-archive-keyring gnupg2
          lb --version

      - name: Import Debian bookworm signing key
        run: |
          sudo gpg --batch --no-tty \
            --keyserver hkps://keyserver.ubuntu.com \
            --recv-keys F8D2585B8783D481 || \
          sudo gpg --batch --no-tty \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys F8D2585B8783D481
          sudo gpg --batch --no-tty --export F8D2585B8783D481 | \
            sudo tee -a /usr/share/keyrings/debian-archive-keyring.gpg > /dev/null

      - name: Patch live-build for Debian compatibility
        run: |
          sudo python3 build-system/scripts/patch-livebuild.py
          sudo cp build-system/scripts/wget-wrapper.sh /usr/local/bin/wget
          sudo chmod +x /usr/local/bin/wget
          echo "All patches done"

      - name: Prepare build directories
        run: |
          mkdir -p build-system/config/includes.chroot/opt/ridos/bin
          mkdir -p build-system/config/includes.chroot/usr/share/ridos
          mkdir -p build-system/config/includes.chroot/etc/ridos
          mkdir -p build-system/config/includes.chroot/etc/apt/apt.conf.d
          mkdir -p build-system/config/package-lists
          mkdir -p build-system/config/hooks/normal
          printf 'Acquire::IndexTargets::deb::Contents-deb::DefaultEnabled "false";\n' \
            > build-system/config/includes.chroot/etc/apt/apt.conf.d/99no-contents
          printf '#!/bin/sh\nmkdir -p /etc/apt/apt.conf.d\necho "Acquire::IndexTargets::deb::Contents-deb::DefaultEnabled false;" > /etc/apt/apt.conf.d/99no-contents\n' \
            > build-system/config/hooks/normal/0001-no-contents.hook.chroot
          chmod +x build-system/config/hooks/normal/0001-no-contents.hook.chroot

      - name: Inject RIDOS core files
        run: |
          cp ridos-core/*.py build-system/config/includes.chroot/opt/ridos/bin/
          cp legal/LICENSE.txt legal/COPYRIGHT legal/CONTRIBUTORS.md \
             build-system/config/includes.chroot/usr/share/ridos/

      - name: Configure live-build
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          cd build-system
          sudo lb config \
            --distribution bookworm \
            --architectures amd64 \
            --mirror-bootstrap "http://deb.debian.org/debian/" \
            --mirror-chroot "http://deb.debian.org/debian/" \
            --mirror-chroot-security "http://security.debian.org/debian-security/" \
            --mirror-binary "http://deb.debian.org/debian/" \
            --mirror-binary-security "http://security.debian.org/debian-security/" \
            --keyring-packages "debian-archive-keyring" \
            --archive-areas "main contrib non-free non-free-firmware" \
            --binary-images iso-hybrid \
            --debian-installer false \
            --memtest none \
            --iso-volume "RIDOS_OS_1.1" \
            --iso-publisher "RIDOS OS Project" \
            --iso-application "RIDOS OS v1.1 Baghdad" \
            --linux-packages "linux-image" \
            --linux-flavours amd64 \
            --firmware-chroot false \
            --firmware-binary false \
            --apt-recommends false \
            --initsystem systemd

      - name: Build ISO
        env:
          DEBIAN_FRONTEND: noninteractive
        continue-on-error: true
        run: |
          cd build-system
          sudo -E lb build 2>&1 | tee /tmp/build.log

      - name: Check and package ISO
        run: |
          cd build-system
          echo "=== Last 20 lines of build log ==="
          tail -20 /tmp/build.log
          ISO=$(find . -name "*.iso" 2>/dev/null | head -1)
          if [ -z "$ISO" ]; then
            echo "FATAL: No ISO produced"
            exit 1
          fi
          echo "ISO: $ISO ($(du -sh $ISO | cut -f1))"
          isohybrid "$ISO" 2>/dev/null && echo "isohybrid OK" || true
          cp "$ISO" "../ridos-os-1.1.0-Baghdad-x86_64.iso"
          cd ..
          md5sum ridos-os-1.1.0-Baghdad-x86_64.iso > ridos-os-1.1.0-Baghdad-x86_64.iso.md5

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: RIDOS-OS-1.1.0-Baghdad
          path: |
            ridos-os-1.1.0-Baghdad-x86_64.iso
            ridos-os-1.1.0-Baghdad-x86_64.iso.md5
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 7

      - name: Create GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release create "${{ github.ref_name }}" \
            ridos-os-1.1.0-Baghdad-x86_64.iso \
            ridos-os-1.1.0-Baghdad-x86_64.iso.md5 \
            --title "RIDOS OS ${{ github.ref_name }} Baghdad" \
            --notes "RIDOS OS AI-powered Linux distro. GPL v3."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
