- name: Full RIDOS OS Build
        run: |
          sudo mkdir -p chroot iso/live iso/boot/grub
          
          # 1. Bootstrap Full Debian
          sudo debootstrap --arch=amd64 bookworm chroot http://deb.debian.org/debian/

          # 2. Add Non-Free and Firmware Repositories (CRITICAL FIX)
          sudo tee chroot/etc/apt/sources.list << 'EOF'
          deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian bookworm-updates main contrib non-free non-free-firmware
          deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
          EOF

          # 3. Mount for installation
          sudo mount --bind /dev chroot/dev
          sudo mount --bind /proc chroot/proc
          sudo mount --bind /sys chroot/sys

          # 4. Install the Full Package List
          sudo chroot chroot apt-get update
          sudo chroot chroot apt-get install -y --no-install-recommends \
            live-boot live-boot-initramfs-tools \
            linux-image-amd64 initramfs-tools \
            xfce4 xfce4-terminal firefox-esr \
            lightdm lightdm-gtk-greeter \
            sudo network-manager bluetooth bluez \
            firmware-linux firmware-linux-nonfree firmware-misc-nonfree \
            intel-microcode amd64-microcode \
            python3 python3-pip git vim nano curl wget \
            pciutils usbutils neofetch htop

          # 5. Basic Branding / Configuration
          echo "ridos-os" | sudo tee chroot/etc/hostname
          sudo chroot chroot useradd -m -s /bin/bash -G sudo ridos
          echo "ridos:ridos" | sudo chroot chroot chpasswd
          echo "root:ridos" | sudo chroot chroot chpasswd

          # 6. Cleanup and Unmount
          sudo umount chroot/sys chroot/proc chroot/dev
          
          # 7. Build SquashFS
          sudo mksquashfs chroot filesystem.squashfs -comp xz -e boot
          sudo cp filesystem.squashfs iso/live/
          
          # 8. Extract Kernel and Initrd
          KERNEL=$(ls chroot/boot/vmlinuz-* | sort -V | tail -1)
          INITRD=$(ls chroot/boot/initrd.img-* | sort -V | tail -1)
          sudo cp "$KERNEL" iso/live/vmlinuz
          sudo cp "$INITRD" iso/live/initrd
          
          # 9. Create GRUB Config
          sudo tee iso/boot/grub/grub.cfg << 'EOF'
          set default=0
          set timeout=5
          menuentry "RIDOS OS v1.1.0 Baghdad" {
            linux /live/vmlinuz boot=live quiet splash
            initrd /live/initrd
          }
          EOF
