name: Build RIDOS OS ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y debootstrap squashfs-tools xorriso grub-pc-bin grub-efi-amd64-bin grub2-common mtools dosfstools gnupg2 curl
          echo "Done"

      - name: Bootstrap Debian
        run: |
          curl -fsSL https://ftp-master.debian.org/keys/release-12.asc | sudo gpg --dearmor -o /usr/share/keyrings/debian-bookworm.gpg
          sudo debootstrap --arch=amd64 --variant=minbase --keyring=/usr/share/keyrings/debian-bookworm.gpg --include=systemd,systemd-sysv,udev,sudo,locales,bash bookworm chroot http://deb.debian.org/debian/
          echo "Bootstrap done"

      - name: Install packages
        run: |
          sudo mount --bind /dev chroot/dev
          sudo mount --bind /proc chroot/proc
          sudo mount --bind /sys chroot/sys
          sudo chroot chroot apt-get update -qq
          sudo chroot chroot apt-get install -y live-boot live-boot-initramfs-tools linux-image-amd64 initramfs-tools grub-pc xfce4 xfce4-terminal network-manager python3 vim nano curl wget fonts-dejavu
          sudo umount chroot/sys chroot/proc chroot/dev
          echo "Done"

      - name: Configure system
        run: |
          echo "ridos-os" | sudo tee chroot/etc/hostname
          sudo chroot chroot useradd -m -s /bin/bash -G sudo ridos
          echo "ridos:ridos" | sudo chroot chroot chpasswd
          sudo mkdir -p chroot/etc/systemd/system/getty@tty1.service.d
          printf '[Service]\nExecStart=\nExecStart=-/sbin/agetty --autologin ridos --noclear %%I $TERM\n' | sudo tee chroot/etc/systemd/system/getty@tty1.service.d/autologin.conf
          echo "Done"

      - name: Install RIDOS files
        run: |
          sudo mkdir -p chroot/opt/ridos/bin
          sudo cp ridos-core/*.py chroot/opt/ridos/bin/
          sudo chmod +x chroot/opt/ridos/bin/*.py
          echo "Done"

      - name: Build squashfs
        run: |
          sudo mksquashfs chroot filesystem.squashfs -comp xz -e boot -noappend
          echo "squashfs done"

      - name: Prepare ISO structure
        run: |
          mkdir -p iso/live iso/boot/grub
          cp filesystem.squashfs iso/live/
          cp chroot/boot/vmlinuz-* iso/live/vmlinuz
          cp chroot/boot/initrd.img-* iso/live/initrd
          cat > iso/boot/grub/grub.cfg << GRUBEOF
          set default=0
          set timeout=5
          menuentry "RIDOS OS v1.1 Baghdad" {
            linux /live/vmlinuz boot=live quiet splash
            initrd /live/initrd
          }
          GRUBEOF
          echo "ISO structure ready"

      - name: Build GRUB images
        run: |
          grub-mkstandalone --format=i386-pc --output=bios.img --locales="" --themes="" "boot/grub/grub.cfg=iso/boot/grub/grub.cfg"
          grub-mkstandalone --format=x86_64-efi --output=bootx64.efi --locales="" --themes="" "boot/grub/grub.cfg=iso/boot/grub/grub.cfg"
      - name: Create bootable ISO
        run: |
          xorriso -as mkisofs -iso-level 3 -full-iso9660-filenames -volid "RIDOS_OS_1.1" --grub2-mbr /usr/lib/grub/i386-pc/boot_hybrid.img -partition_offset 16 --mbr-force-bootable -append_partition 2 0xef efi.img -appended_part_as_gpt -eltorito-boot boot/grub/bios.img -eltorito-catalog boot/grub/boot.cat -no-emul-boot -boot-load-size 4 -boot-info-table --grub2-boot-info -eltorito-alt-boot -eltorito-platform efi -eltorito-boot --interval:appended_partition_2:all:: -no-emul-boot -o ridos-os-1.1.0-Baghdad-x86_64.iso -graft-points "/boot/grub/bios.img=bios.img" "/=iso"
          ls -lh ridos-os-1.1.0-Baghdad-x86_64.iso
          file ridos-os-1.1.0-Baghdad-x86_64.iso
          md5sum ridos-os-1.1.0-Baghdad-x86_64.iso > ridos-os-1.1.0-Baghdad-x86_64.iso.md5

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: RIDOS-OS-1.1.0-Baghdad
          path: |
            ridos-os-1.1.0-Baghdad-x86_64.iso
            ridos-os-1.1.0-Baghdad-x86_64.iso.md5
          retention-days: 30
