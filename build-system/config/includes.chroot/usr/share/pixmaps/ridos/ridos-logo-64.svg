<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a0a3a"/>
      <stop offset="100%" stop-color="#0a0612"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Hexagon background -->
  <polygon points="32,2 62,18 62,46 32,62 2,46 2,18"
           fill="url(#bg)"/>

  <!-- Hexagon border -->
  <polygon points="32,2 62,18 62,46 32,62 2,46 2,18"
           fill="none" stroke="#8b5cf6" stroke-width="2"/>

  <!-- Inner hex ring -->
  <polygon points="32,8 56,22 56,42 32,56 8,42 8,22"
           fill="none" stroke="#6d28d9" stroke-width="0.8" stroke-opacity="0.6"/>

  <!-- R letter -->
  <text x="32" y="44" text-anchor="middle"
        font-family="'Courier New', monospace"
        font-weight="700" font-size="36"
        fill="#a78bfa" filter="url(#glow)">R</text>
</svg>
