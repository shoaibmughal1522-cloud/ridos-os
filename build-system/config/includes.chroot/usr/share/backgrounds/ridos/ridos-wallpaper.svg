<?xml version="1.0" encoding="UTF-8"?>
<!--
  RIDOS OS v1.1 — Default Wallpaper
  Copyright (C) 2026 RIDOS OS Project — GPL v3
  Style: Dark Purple — Modern & Professional
  Resolution: 1920x1080
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0612"/>
      <stop offset="40%"  stop-color="#0f0820"/>
      <stop offset="100%" stop-color="#150d30"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#4a1080" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0a0612" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="65%" r="45%">
      <stop offset="0%"   stop-color="#6d28d9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0a0612" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <pattern id="hexGrid" x="0" y="0" width="80" height="92" patternUnits="userSpaceOnUse">
      <polygon points="40,4 72,22 72,58 40,76 8,58 8,22"
               fill="none" stroke="#3b1a6b" stroke-width="0.6" opacity="0.4"/>
    </pattern>
    <pattern id="scanlines" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="#000000" opacity="0.08"/>
    </pattern>
    <filter id="blur20"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="blur8"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="blur3"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow1)"/>
  <rect width="1920" height="1080" fill="url(#glow2)"/>
  <rect width="1920" height="1080" fill="url(#hexGrid)" opacity="0.6"/>

  <g opacity="0.05" stroke="#a855f7" stroke-width="1">
    <line x1="0" y1="200"  x2="500"  y2="0"/>
    <line x1="0" y1="500"  x2="900"  y2="0"/>
    <line x1="200" y1="1080" x2="1920" y2="100"/>
    <line x1="700" y1="1080" x2="1920" y2="500"/>
  </g>

  <g fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.25">
    <polyline points="40,80 40,40 80,40"/>
    <polyline points="1880,80 1880,40 1840,40"/>
    <polyline points="40,1000 40,1040 80,1040"/>
    <polyline points="1880,1000 1880,1040 1840,1040"/>
  </g>

  <g fill="#a855f7" opacity="0.35">
    <circle cx="180"  cy="150"  r="1.5"/>
    <circle cx="320"  cy="280"  r="1"/>
    <circle cx="1600" cy="200"  r="1.8"/>
    <circle cx="1750" cy="380"  r="1"/>
    <circle cx="200"  cy="900"  r="1.5"/>
    <circle cx="1200" cy="950"  r="1.8"/>
    <circle cx="700"  cy="80"   r="1.2"/>
  </g>

  <ellipse cx="960" cy="490" rx="280" ry="200"
           fill="url(#logoGlow)" filter="url(#blur20)" opacity="0.5"/>

  <!-- RIDOS Hexagon Logo -->
  <g transform="translate(960, 455)">
    <polygon points="0,-90 78,-45 78,45 0,90 -78,45 -78,-45"
             fill="#110828" stroke="#7c3aed" stroke-width="1.5"/>
    <polygon points="0,-78 67,-39 67,39 0,78 -67,39 -67,-39"
             fill="none" stroke="#a855f7" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="28"
          font-family="'Courier New', monospace"
          font-size="72" font-weight="700"
          fill="#7c3aed" text-anchor="middle"
          filter="url(#blur3)" opacity="0.5">R</text>
    <text x="0" y="28"
          font-family="'Courier New', monospace"
          font-size="72" font-weight="700"
          fill="#e9d5ff" text-anchor="middle">R</text>
  </g>

  <!-- Wordmark -->
  <text x="960" y="600"
        font-family="'Courier New', monospace"
        font-size="52" font-weight="700" letter-spacing="18"
        fill="#7c3aed" text-anchor="middle"
        filter="url(#blur8)" opacity="0.8">RIDOS OS</text>
  <text x="960" y="600"
        font-family="'Courier New', monospace"
        font-size="52" font-weight="700" letter-spacing="18"
        fill="#e9d5ff" text-anchor="middle">RIDOS OS</text>

  <line x1="660" y1="622" x2="1260" y2="622"
        stroke="#7c3aed" stroke-width="0.8" opacity="0.6"/>

  <text x="960" y="658"
        font-family="'Courier New', monospace"
        font-size="13" letter-spacing="6"
        fill="#9333ea" text-anchor="middle" opacity="0.8">
    RETRO INTELLIGENT DESKTOP OS  ·  v1.1.0 "Basra"
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="1044" width="1920" height="36" fill="#080412" opacity="0.8"/>
  <line x1="0" y1="1044" x2="1920" y2="1044" stroke="#3b1a6b" stroke-width="1"/>
  <text x="960" y="1067"
        font-family="'Courier New', monospace"
        font-size="10" letter-spacing="2"
        fill="#581c87" text-anchor="middle">
    Copyright (C) 2026 RIDOS OS Project  ·  GPL v3  ·  github.com/alexeaiskinder-mea/ridos-os
  </text>

  <rect width="1920" height="1080" fill="url(#scanlines)" opacity="0.4"/>
</svg>
