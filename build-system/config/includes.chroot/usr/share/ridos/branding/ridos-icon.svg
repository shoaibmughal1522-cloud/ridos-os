<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#2d1465"/>
      <stop offset="100%" stop-color="#0f0820"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur6"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <!-- Hexagon base -->
  <polygon points="128,8 220,58 220,158 128,208 36,158 36,58"
           fill="url(#bg)" stroke="#7c3aed" stroke-width="3"/>

  <!-- Inner hex ring -->
  <polygon points="128,22 208,68 208,148 128,194 48,148 48,68"
           fill="none" stroke="#a855f7" stroke-width="1" opacity="0.3"/>

  <!-- Glow -->
  <ellipse cx="128" cy="108" rx="70" ry="60"
           fill="url(#glow)" filter="url(#blur6)" opacity="0.6"/>

  <!-- R letter - glow layer -->
  <text x="128" y="148"
        font-family="'Courier New', monospace"
        font-size="110" font-weight="700"
        fill="#7c3aed" text-anchor="middle"
        filter="url(#blur2)" opacity="0.5">R</text>

  <!-- R letter - main -->
  <text x="128" y="148"
        font-family="'Courier New', monospace"
        font-size="110" font-weight="700"
        fill="#e9d5ff" text-anchor="middle">R</text>

  <!-- Corner dots -->
  <circle cx="128" cy="14"  r="3" fill="#7c3aed" opacity="0.6"/>
  <circle cx="128" cy="202" r="3" fill="#7c3aed" opacity="0.6"/>
  <circle cx="40"  cy="62"  r="3" fill="#7c3aed" opacity="0.6"/>
  <circle cx="216" cy="62"  r="3" fill="#7c3aed" opacity="0.6"/>
  <circle cx="40"  cy="154" r="3" fill="#7c3aed" opacity="0.6"/>
  <circle cx="216" cy="154" r="3" fill="#7c3aed" opacity="0.6"/>
</svg>
