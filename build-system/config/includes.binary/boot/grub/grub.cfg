set default=0
set timeout=10

# ── Graphics ──────────────────────────────────────────────────
insmod all_video
insmod gfxterm
insmod gfxmenu
insmod png
insmod jpeg

set gfxmode=1024x768,800x600,640x480,auto
set gfxpayload=keep
terminal_output gfxterm

# ── Theme ──────────────────────────────────────────────────────
if [ -f /boot/grub/themes/ridos/theme.txt ]; then
  set theme=/boot/grub/themes/ridos/theme.txt
fi

# ── Boot Entries ──────────────────────────────────────────────

menuentry "RIDOS OS v1.1  —  Start System" --class ridos --class linux {
  insmod gzio
  insmod part_gpt
  insmod part_msdos
  insmod ext2
  insmod squash4
  search --no-floppy --label --set=root RIDOS_OS_1.1
  linux   /live/vmlinuz boot=live quiet splash
  initrd  /live/initrd.img
}

menuentry "RIDOS OS v1.1  —  Safe Mode (nomodeset)" --class ridos {
  insmod gzio
  search --no-floppy --label --set=root RIDOS_OS_1.1
  linux   /live/vmlinuz boot=live nomodeset
  initrd  /live/initrd.img
}

menuentry "RIDOS OS v1.1  —  RAM Mode (copy to RAM)" --class ridos {
  insmod gzio
  search --no-floppy --label --set=root RIDOS_OS_1.1
  linux   /live/vmlinuz boot=live toram quiet splash
  initrd  /live/initrd.img
}

menuentry "RIDOS OS v1.1  —  Forensic Mode (no automount)" --class ridos {
  insmod gzio
  search --no-floppy --label --set=root RIDOS_OS_1.1
  linux   /live/vmlinuz boot=live noswap nopersist quiet
  initrd  /live/initrd.img
}

menuentry "" { true }

menuentry "Boot from Hard Disk" {
  set root=(hd0)
  chainloader +1
}

menuentry "UEFI Firmware Settings" {
  fwsetup
}

